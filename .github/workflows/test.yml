name: test
on:
  pull_request:
    branches:
      - main
    paths:
      - "app/src/**"
      - "app/tests/components/**"
      - "app/vite.config.ts"
      - "app/vitest.config.ts"
      - "app/tsconfig.json"
      - "app/eslint.config.js"
      - "app/biome.json"
      - "app/package.json"
      - "app/pnpm-lock.yaml"
      - ".github/workflows/test.yml"
  workflow_dispatch:
env:
  NO_UPDATE_NOTIFIER: true
jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false
          package_json_file: ./app/package.json
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: "app/pnpm-lock.yaml"
      - name: Install dependencies
        run: pnpm ci --ignore-scripts
        working-directory: ./app
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: setup
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false
          package_json_file: ./app/package.json
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: "app/pnpm-lock.yaml"
      - name: Install dependencies
        run: pnpm ci --ignore-scripts
        working-directory: ./app
      - name: Check types, linting & formatting
        run: |
          npm run typecheck
          npm run eslint
          npm run lint
          npm run format
        working-directory: ./app
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [setup, check]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false
          package_json_file: ./app/package.json
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: "app/pnpm-lock.yaml"
      - name: Install dependencies
        run: pnpm ci --ignore-scripts
        working-directory: ./app
      - name: Build
        run: npm run build
        working-directory: ./app
  tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: setup
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false
          package_json_file: ./app/package.json
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: "app/pnpm-lock.yaml"
      - name: Install dependencies
        run: pnpm ci --ignore-scripts
        working-directory: ./app
      - name: Run tests
        run: pnpm run vitest
        working-directory: ./app
