name: sonar
on:
  push:
    branches:
      - main
    paths:
      - "data/src/**"
      - "data/handlers/**"
      - "data/tests/**"
      - "data/pyproject.toml"
      - "data/poetry.lock"
      - "data/Dockerfile"
      - "data/lambda/Dockerfile"
      - "app/src/**"
      - "app/tests/**"
      - "app/package.json"
      - "app/pnpm-lock.yaml"
      - "**/Dockerfile"
      - ".github/workflows/sonar.yml"
  pull_request:
    branches:
      - main
    paths:
      - "data/src/**"
      - "data/handlers/**"
      - "data/tests/**"
      - "data/pyproject.toml"
      - "data/poetry.lock"
      - "data/Dockerfile"
      - "data/lambda/Dockerfile"
      - "app/src/**"
      - "app/tests/**"
      - "app/package.json"
      - "app/pnpm-lock.yaml"
      - "**/Dockerfile"
      - ".github/workflows/sonar.yml"
  schedule:
    - cron: "0 21 * * 0"
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
