name: datatest
on:
  pull_request:
    branches:
      - main
    paths:
      - "data/src/**"
      - "data/handlers/**"
      - "data/tests/**"
      - "data/pyproject.toml"
      - "data/poetry.lock"
      - "data/requirements.txt"
      - ".github/workflows/datatest.yml"
  workflow_dispatch:
jobs:
  extract-poetry-version:
    permissions:
      contents: read
    uses: ./.github/workflows/poetry-version.yml
  test:
    runs-on: ubuntu-latest
    needs: extract-poetry-version
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Poetry
        run: |
          curl --proto "=https" -sSL https://install.python-poetry.org | python3 - \
          --version ${{ needs.extract-poetry-version.outputs.poetry-version }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          architecture: "x64"
          cache: "poetry"
          cache-dependency-path: "data/poetry.lock"
      - name: Install dependencies
        run: poetry install --no-interaction --only main,dev
        working-directory: ./data
      - name: Check linting & formatting
        run: |
          poetry run ruff check .
          poetry run ruff format .
        working-directory: ./data
      - name: Run tests
        run: poetry run pytest
        working-directory: ./data
