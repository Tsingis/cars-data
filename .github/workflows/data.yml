name: data
on:
  push:
    branches:
      - main
    paths:
      - "data/lambdas/data.py"
      - "data/src/**"
      - "data/pyproject.toml"
      - "data/poetry.lock"
      - "data/Dockerfile"
  pull_request:
    branches:
      - main
    paths:
      - "data/lambdas/data.py"
      - "data/src/**"
      - "data/pyproject.toml"
      - "data/poetry.lock"
      - "data/requirements.txt"
      - "data/Dockerfile"
      - ".github/workflows/data.yml"
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  extract-poetry-version:
    permissions:
      contents: read
    uses: ./.github/workflows/poetry-version.yml
  build:
    runs-on: ubuntu-latest
    needs: extract-poetry-version
    permissions:
      id-token: write
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Configure AWS Credentials
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE }}
      - name: Login to Amazon ECR
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: aws-actions/amazon-ecr-login@19d944daaa35f0fa1d3f7f8af1d3f2e5de25c5b7 # v2.1.4
      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          logout: true
      - name: Build image
        run: |
          docker buildx build --provenance=false \
          --build-arg POETRY_VERSION=${{ needs.extract-poetry-version.outputs.poetry-version }} \
          --build-arg BASE_IMAGE=${{ vars.LAMBDA_IMAGE_REPOSITORY}}:${{ vars.LAMBDA_IMAGE_TAG }} \
          -t ${{ vars.DATA_LAMBDA_IMAGE_REPOSITORY }}:${{ vars.DATA_LAMBDA_IMAGE_TAG }} .
        working-directory: ./data
      - name: Push image
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          docker push ${{ vars.DATA_LAMBDA_IMAGE_REPOSITORY }}:${{ vars.DATA_LAMBDA_IMAGE_TAG }}
  deploy:
    runs-on: ubuntu-latest
    environment: AWS-data-lambda
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE }}
      - name: Deploy
        uses: aws-actions/aws-lambda-deploy@20039225425cbacb648cf1ffe08cc221f19b65a0 # v1.1.1
        with:
          function-name: ${{ vars.DATA_LAMBDA_NAME }}
          package-type: Image
          image-uri: "${{ vars.DATA_LAMBDA_IMAGE_REPOSITORY }}:${{ vars.DATA_LAMBDA_IMAGE_TAG }}"
